<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Data</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", Roboto, sans-serif;
            background: #f5f5f7;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 85%;
            max-width: 900px;
            margin: 80px auto;
            background: rgba(255, 255, 255, 0.7);
            padding: 30px;
            border-radius: 20px;
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 500;
            color: #1d1d1f;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 12px;
        }

        th, td {
            padding: 14px;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: #f2f2f7;
            color: #6e6e73;
            font-weight: 500;
        }

        td {
            background: #ffffff;
            border-top: 1px solid #e5e5ea;
            color: #1d1d1f;
        }

        tr:hover td {
            background: #f9f9fb;
        }

        /* Apple-style button */
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 18px;
            background: #0071e3;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
            transition: 0.25s ease;
        }

        .btn:hover {
            background: #005bb5;
        }

        .center {
            text-align: center;
        }
        .delete-btn {
    padding: 6px 12px;
    background: #ff3b30;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-size: 13px;
    transition: 0.2s ease;
}

.delete-btn:hover {
    background: #d92c23;
}
    </style>

</head>
<body>

<div class="container">

    <h2>User Data</h2>

        <table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
        <th>Action</th>
    </tr>

    {% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>
        <a href="/delete/{{ row[0] }}" 
           class="delete-btn"
           onclick="return confirm('Are you sure you want to delete this?')">
           Delete
        </a>
    </td>
</tr>
{% endfor %}
</table>

    <!-- Back Button -->
    <div class="center">
        <a href="/" class="btn">Back to Form</a>
    </div>

</div>

</body>
</html>
